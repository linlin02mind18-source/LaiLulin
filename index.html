<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA Ashirakorn | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+Thai:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8f4; --card: #ffffff; --ink: #1a1a1a;
            --sub: #6b6560; --hint: #b0aba4; --accent: #c8956c;
            --border: #ebe8e2;
        }
        body { background-color: var(--bg); color: var(--ink); font-family: 'Noto Sans Thai', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'DM Mono', monospace; }

        /* สไตล์เมนูคลิกเข้าไปหน้าใหม่ */
        .nav-link {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--hint);
            transition: all 0.4s ease;
            position: relative;
            cursor: pointer;
        }
        .nav-link:hover {
            color: var(--accent);
            padding-left: 10px;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0; height: 1px;
            bottom: 0; left: 0;
            background-color: var(--accent);
            transition: width 0.4s ease;
        }
        .nav-link:hover::after { width: 100%; }

        .profile-card {
            background: var(--card);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-6xl w-full">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-center">
            
            <div class="md:col-span-7 profile-card flex flex-col md:flex-row shadow-sm">
                <div class="md:w-1/2 h-[400px]">
                    <img src="https://mintmagth.s3.ap-southeast-1.amazonaws.com/photos/shares/Mint%20People/2024/DEC%202024/AA%20SunGlass/6764e12f4b64c.jpg" 
                         class="w-full h-full object-cover" alt="Profile">
                </div>
                <div class="md:w-1/2 p-8 flex flex-col justify-center">
                    <h2 class="serif italic text-[--accent] mb-2">The Artist</h2>
                    <h1 class="text-4xl font-bold mb-4">AA <span class="text-xl font-light">อชิรกรณ์</span></h1>
                    <p class="text-sm text-[--sub] leading-relaxed mb-6">
                        สมาชิกวง BUS (Because of you i shine) ศิลปินผู้มากความสามารถทั้งด้านการร้อง เต้น และการเล่นดนตรี
                    </p>
                    <div class="flex gap-3">
                        <span class="w-2 h-2 rounded-full bg-[--accent]"></span>
                        <span class="w-2 h-2 rounded-full bg-[--border]"></span>
                        <span class="w-2 h-2 rounded-full bg-[--border]"></span>
                    </div>
                </div>
            </div>

            <div class="md:col-span-5 flex flex-col gap-6 md:pl-12">
                <p class="mono text-xs tracking-widest text-[--hint] uppercase">Explore More</p>
                
                <a href="members.html" class="nav-link">
                    01. Members <span class="text-sm font-normal">/ สมาชิก</span>
                </a>

                <a href="works.html" class="nav-link">
                    02. Works <span class="text-sm font-normal">/ ผลงาน</span>
                </a>

                <a href="about.html" class="nav-link">
                    03. Biography <span class="text-sm font-normal">/ ประวัติอย่างละเอียด</span>
                </a>

                <div class="mt-8 border-t border-[--border] pt-6">
                    <p class="text-xs text-[--hint] mono">CONNECT WITH US</p>
                    <div class="flex gap-4 mt-2">
                        <a href="#" class="text-lg">📸</a>
                        <a href="#" class="text-lg">🎶</a>
                        <a href="#" class="text-lg">✖️</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
