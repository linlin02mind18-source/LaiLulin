<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUS — Discography</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+Thai:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f4;
      --card: #ffffff;
      --ink: #1a1a1a;
      --sub: #6b6560;
      --hint: #b0aba4;
      --accent: #c8956c;
      --accent2: #7a9e8a;
      --border: #ebe8e2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans Thai', sans-serif;
      min-height: 100vh;
      padding: 48px 16px 80px;
    }

    h1, h2, .serif { font-family: 'Playfair Display', serif; }
    .mono { font-family: 'DM Mono', monospace; }

    .page-header {
      max-width: 960px;
      margin: 0 auto 48px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 32px;
    }

    .page-header h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 1;
    }

    .page-header h1 span {
      color: var(--accent);
    }

    .page-header p {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--hint);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .filter-bar {
      max-width: 960px;
      margin: 0 auto 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--sub);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.05em;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    .table-wrap {
      max-width: 960px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .col-header {
      display: grid;
      grid-template-columns: 1fr 160px 130px 150px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
    }

    .col-header span {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--hint);
    }

    .col-header span:not(:first-child) {
      text-align: center;
    }

    .col-header span:last-child {
      text-align: right;
    }

    .track-row {
      display: grid;
      grid-template-columns: 1fr 160px 130px 150px;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
      cursor: default;
    }

    .track-row:last-child { border-bottom: none; }

    .track-row:hover { background: var(--bg); }

    .track-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .track-thumb {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }

    .track-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.3;
    }

    .track-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--hint);
      margin-top: 3px;
    }

    .track-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--sub);
      text-align: center;
      letter-spacing: 0.03em;
    }

    .track-type {
      text-align: center;
    }

    .tag {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      border: 1px solid var(--border);
      color: var(--sub);
      background: var(--bg);
      white-space: nowrap;
    }

    .tag.unit-all { border-color: #c8956c55; color: var(--accent); background: #c8956c11; }
    .tag.unit-5   { border-color: #7a9e8a55; color: var(--accent2); background: #7a9e8a11; }
    .tag.unit-7   { border-color: #7a8fbe55; color: #5a6fa0; background: #7a8fbe11; }

    .track-listen { text-align: right; }

    .yt-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 20px;
      border-radius: 40px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      text-decoration: none;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .yt-btn:hover {
      background: #ff0000;
      border-color: #ff0000;
      color: #fff;
    }

    .yt-btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    @media (max-width: 680px) {
      .col-header { grid-template-columns: 1fr 120px; }
      .col-header span:nth-child(2),
      .col-header span:nth-child(3) { display: none; }
      .track-row { grid-template-columns: 1fr 120px; }
      .track-date, .track-type { display: none; }
      .track-thumb { width: 44px; height: 44px; }
    }
  </style>
</head>

    const unitClass = { BUS: "unit-all", BUS5: "unit-5", BUS7: "unit-7" };

    function buildList(filter) {
      const list = document.getElementById("track-list");
      list.innerHTML = "";

      let lastYear = null;

      const filtered = tracks.filter(t => {
        if (filter === "all")  return true;
        if (filter === "BUS5") return t.unit === "BUS5";
        if (filter === "BUS7") return t.unit === "BUS7";
        if (filter === "BUS")  return t.unit === "BUS";
        if (filter === "789 TRAINEE")  return t.unit === "789 TRAINEE";
        if (filter === "Special Single")  return t.type === "Special Single";
        if (filter === "LIVE SESSION")  return t.type === "LIVE SESSION";
        if (filter === "BUS COVER PROJECT")  return t.type === "BUS COVER PROJECT";
        if (!isNaN(filter))    return t.year === parseInt(filter);
        return true;
      }).sort((a, b) => new Date(a.date) - new Date(b.date));

      filtered.forEach(t => {
        if (t.year !== lastYear) {
          lastYear = t.year;
          const label = document.createElement("div");
          label.className = "section-label";
          label.textContent = t.year;
          list.appendChild(label);
        }

        const thumb = `https://img.youtube.com/vi/${t.ytId}/mqdefault.jpg`;

        const row = document.createElement("div");
        row.className = "track-row";
        row.innerHTML = `
          <div class="track-info">
            <img class="track-thumb" src="${thumb}" alt="${t.title}" loading="lazy">
            <div class="track-text">
              <div class="track-title">${t.title}</div>
              <div class="track-sub">${t.unit}</div>
            </div>
          </div>
          <div class="track-date">${t.date}</div>
          <div class="track-type">
            <span class="tag ${unitClass[t.unit]}">${t.type}</span>
          </div>
          <div class="track-listen">
            <a href="${t.yt}" target="_blank" class="yt-btn" aria-label="ดูใน YouTube">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/>
              </svg>
              YouTube
            </a>
          </div>
        `;
        list.appendChild(row);
      });

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.style.cssText = "padding: 40px 24px; color: var(--hint); font-family: 'DM Mono', monospace; font-size: 0.8rem;";
        empty.textContent = "ไม่พบเพลง";
        list.appendChild(empty);
      }
    }

    function filterTracks(filter, btn) {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      buildList(filter);
    }

    buildList("all");
  </script>
