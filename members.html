  <style>
    :root {
      --bg: #faf8f4;
      --card: #ffffff;
      --ink: #1a1a1a;
      --sub: #6b6560;
      --hint: #b0aba4;
      --accent: #c8956c;
      --accent2: #7a9e8a;
      --border: #ebe8e2;
    }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans Thai', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1, h2, .serif { font-family: 'Playfair Display', serif; }
    .mono { font-family: 'DM Mono', monospace; }

    .profile-container {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.03);
    }

    .profile-photo {
      background-size: cover;
      background-position: center;
    }

    .social-btn {
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 0.8rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--ink);
    }

    .social-btn:hover {
      background-color: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
      transform: translateY(-2px);
    }

    .tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      background: var(--bg);
      color: var(--sub);
      border: 1px solid var(--border);
    }
  </style>
</head>

    function renderMember(m) {

      const socials = m.socials.map(s => `

      <div class="md:w-2/5 min-h-[450px] profile-photo"
           style="background-image: url('${m.photo}');">
      </div>

          <h1 class="text-5xl mb-2">${m.name}<br>
            <span class="text-[--accent]">${m.nameTh}</span>
          </h1>
          <div class="flex gap-4 text-sm text-[--sub] mono">
            <span>BUS (because of you i shine)</span>
          </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
          <div>
            <h3 class="serif text-xl mb-3 flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-[--accent]"></span> ประวัติเบื้องต้น
            </h3>
            <p class="text-[--sub] text-sm leading-relaxed">${m.bio}</p>
          </div>
          <div>
            <h3 class="serif text-xl mb-3 flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-[--accent2]"></span> บุคลิกภาพและสัญลักษณ์
            </h3>
            <p class="text-[--sub] text-sm leading-relaxed">${m.personality}</p>
          </div>
        </div>

        <div class="mb-10">
          <h3 class="serif text-lg mb-4 italic text-[--sub]">Things I Love</h3>
          <div class="flex flex-wrap gap-2">
            ${tags}
          </div>
        </div>

        <div class="border-t border-[--border] pt-8">
          <p class="mono text-[10px] uppercase tracking-[0.2em] mb-4 text-[--hint]">Join my journey</p>
          <div class="flex flex-wrap gap-3">
            ${socials}
          </div>
