<head>
  <meta charset="UTF-8">

  <title>BUS — Members</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+Thai:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f4ef;
      --card: #ffffff;
      --ink: #181614;
      --sub: #6b6560;
      --hint: #b8b3ac;
      --accent: #c8956c;
      --accent2: #7a9e8a;
      --border: #e8e3dc;
      --gold: #c9a96e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans Thai', sans-serif;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* ── HERO HEADER ── */
    .site-header {
      padding: 72px 48px 56px;
      max-width: 1100px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
      margin-bottom: 64px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
    }

    .site-header__eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .site-header__title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-style: italic;
      font-weight: 700;
      line-height: 0.95;
      color: var(--ink);
    }

    .site-header__title span {
      color: var(--accent);
      font-style: normal;
    }

    .site-header__meta {
      text-align: right;
    }

    .site-header__count {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-style: italic;
      color: var(--hint);
      line-height: 1;
    }

    .site-header__label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--hint);
    }

    /* ── MEMBERS GRID ── */
    .members-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 48px 100px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* ── CARD ── */
    .card {
      display: grid;
      grid-template-columns: 320px 1fr;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      margin-bottom: 24px;
    }

    .card:hover {
      box-shadow: 0 24px 64px rgba(0,0,0,0.07);
      transform: translateY(-3px);
    }

    /* photo */
    .card__photo {
      position: relative;
      min-height: 420px;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .card__photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(20,16,12,0.35) 0%, transparent 50%);
    }

    .card__badge {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
    }

    /* body */
    .card__body {
      padding: 44px 48px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .card__name {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.0;
      margin-bottom: 6px;
    }

    .card__name-th {
      color: var(--accent);
    }

    .card__group {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--hint);
    }

    /* info grid */
    .card__info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
    }

    .info-block__label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-block__label::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .info-block__text {
      font-size: 0.82rem;
      color: var(--sub);
      line-height: 1.8;
    }

    /* loves */
    .card__loves-label {
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-style: italic;
      color: var(--hint);
      margin-bottom: 10px;
    }

    .loves-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .love-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 5px 14px;
      border-radius: 20px;
      background: var(--bg);
      color: var(--sub);
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .love-tag:hover {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
    }

    /* socials */
    .card__socials {
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    .socials-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--hint);
      margin-bottom: 12px;
    }

    .socials-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .social-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--sub);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .social-btn span { color: var(--accent); }

    .social-btn:hover {
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
      transform: translateY(-2px);
    }

    .social-btn:hover span { color: var(--bg); }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 0;
      opacity: 0.4;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-num {
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      font-style: italic;
      color: var(--hint);
    }

    .site-header__back {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--sub);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 28px;
  transition: color 0.2s;
}

.site-header__back:hover { color: var(--ink); }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .card { grid-template-columns: 1fr; }
      .card__photo { min-height: 340px; }
      .card__body { padding: 28px 28px; }
      .card__info { grid-template-columns: 1fr; gap: 20px; }
      .site-header { padding: 40px 24px 32px; }
      .members-wrapper { padding: 0 24px 60px; }
    }
  </style>
</head>
